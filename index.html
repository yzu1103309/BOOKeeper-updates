<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOOKeeper Update</title>
  <link rel="icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --card: #ffffff;
      --surface: #f9fafb;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary: #059669;
      --border: #e5e7eb;
      --disabled: #d1d5db;
      --error: #b91c1c;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f3f4f6;
      border: 1px solid var(--border);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
    }

    .version {
      margin: 0 0 22px 8px;
      font-size: 17px;
      color: var(--muted);
    }

    .options {
      display: grid;
      gap: 14px;
    }

    .option {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: var(--surface);
    }

    .option-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .option h2 {
      font-size: 17px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 4px 10px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .option p {
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
      padding: 10px 15px;
      border-radius: 12px;
      border: 0;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .button:hover {
      background: var(--primary-hover);
    }

    .button.secondary {
      background: var(--secondary);
    }

    .button.outline {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .button.disabled {
      background: var(--disabled);
      color: #4b5563;
      cursor: not-allowed;
      pointer-events: none;
    }

    .notice {
      margin-top: 12px;
      color: var(--error);
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 20px;
      }

      .option-header {
        display: block;
      }

      .badge {
        margin-top: 8px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="app-header">
      <img class="app-icon" src="icon.png" alt="BOOKeeper icon" />
      <h1 class="app-title">BOOKeeper</h1>
    </div>

    <p class="version" id="versionText">Loading update version...</p>

    <section class="options" id="optionsSection"></section>
  </main>

  <script>
    const APP_STORE_LINK = 'https://apps.apple.com/app/expo-go/id982107779';
    const PLAY_STORE_LINK = 'https://play.google.com/store/apps/details?id=host.exp.exponent';
    const RELEASE_REPO = 'yzu1103309/BOOKeeper-updates';
    const SIDESTORE_DOCS = 'https://docs.sidestore.io/';
    const LIVECONTAINER_DOCS = 'https://livecontainer.github.io/docs/intro';

    const state = {
      platform: detectPlatform(),
      version: '',
      expoUrl: '',
      ipaUrl: '',
      apkUrl: '',
    };

    function detectPlatform() {
      const ua = navigator.userAgent || '';
      if (/android/i.test(ua)) return 'android';
      if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
      return 'unknown';
    }

    function buttonLink(label, href, className = '') {
      return `<a class="button ${className}" href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }

    function disabledButton(label) {
      return `<span class="button disabled">${label}</span>`;
    }

    async function loadReleaseAssets(version) {
      const url = `https://api.github.com/repos/${RELEASE_REPO}/releases/tags/v${encodeURIComponent(version)}`;

      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (response.status === 404) return { ipaUrl: '', apkUrl: '' };
        if (!response.ok) throw new Error(`GitHub release lookup failed: ${response.status}`);

        const release = await response.json();
        const assets = Array.isArray(release.assets) ? release.assets : [];
        const ipa = assets.find((asset) => asset.name === `BOOKeeper-${version}.ipa`)
          || assets.find((asset) => asset.name.endsWith('.ipa'));
        const apk = assets.find((asset) => asset.name === `BOOKeeper-${version}.apk`)
          || assets.find((asset) => asset.name.endsWith('.apk'));

        return {
          ipaUrl: ipa?.browser_download_url || '',
          apkUrl: apk?.browser_download_url || '',
        };
      } catch (error) {
        console.error(error);
        return { ipaUrl: '', apkUrl: '' };
      }
    }

    function renderUnsupported() {
      document.getElementById('optionsSection').innerHTML = `
        <article class="option">
          <h2>Not Supported on this device</h2>
          <p>Open this page on iOS or Android to install BOOKeeper.</p>
        </article>
      `;
    }

    function renderExpoOption(storeLink, storeLabel) {
      return `
        <article class="option">
          <div class="option-header">
            <h2>Expo Preview</h2>
            <span class="badge">Recommended</span>
          </div>
          <p>Use Expo Go for the fastest update path. Preview builds receive fixes through Expo updates.</p>
          <div class="actions">
            ${buttonLink(storeLabel, storeLink, 'outline')}
            ${state.expoUrl ? buttonLink('Open in Expo', state.expoUrl) : disabledButton('Expo Link Unavailable')}
          </div>
        </article>
      `;
    }

    function renderIos() {
      const sideloadActions = state.ipaUrl
        ? `<button class="button secondary" type="button" id="showSideload">Show Sideload Options</button>`
        : disabledButton('No Release Available');

      document.getElementById('optionsSection').innerHTML = `
        ${renderExpoOption(APP_STORE_LINK, 'Install Expo Go')}
        <article class="option">
          <div class="option-header">
            <h2>Sideload IPA</h2>
            <span class="badge">Optional</span>
          </div>
          <p>Use this only when a release build exists for the current version.</p>
          <div class="actions">${sideloadActions}</div>
          ${state.ipaUrl ? '' : '<p class="notice">No Release Available</p>'}
        </article>
      `;

      document.getElementById('showSideload')?.addEventListener('click', renderIosSideload);
    }

    function renderIosSideload() {
      document.getElementById('optionsSection').innerHTML = `
        <article class="option">
          <div class="option-header">
            <h2>Sideload BOOKeeper ${state.version}</h2>
            <span class="badge">IPA</span>
          </div>
          <p>Install SideStore and LiveContainer using their official documentation, then download the IPA for this version.</p>
          <div class="actions">
            ${buttonLink('SideStore Docs', SIDESTORE_DOCS, 'outline')}
            ${buttonLink('LiveContainer Docs', LIVECONTAINER_DOCS, 'outline')}
            ${buttonLink('Download IPA', state.ipaUrl, 'secondary')}
            <button class="button outline" type="button" id="backToOptions">Back</button>
          </div>
        </article>
      `;

      document.getElementById('backToOptions')?.addEventListener('click', renderIos);
    }

    function renderAndroid() {
      const apkActions = state.apkUrl
        ? buttonLink('Download APK', state.apkUrl, 'secondary')
        : disabledButton('No Release Available');

      document.getElementById('optionsSection').innerHTML = `
        ${renderExpoOption(PLAY_STORE_LINK, 'Install Expo Go')}
        <article class="option">
          <div class="option-header">
            <h2>Install APK</h2>
            <span class="badge">Optional</span>
          </div>
          <p>Download the APK only when a release build exists for the current version.</p>
          <div class="actions">${apkActions}</div>
          ${state.apkUrl ? '' : '<p class="notice">No Release Available</p>'}
        </article>
      `;
    }

    async function loadVersionInfo() {
      const versionText = document.getElementById('versionText');

      try {
        const response = await fetch('./latest_version', { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load latest_version');

        const data = await response.json();
        state.version = data.version || 'unknown';
        state.expoUrl = state.platform === 'ios' ? data.ios_link : data.android_link;
        versionText.textContent = `Update version ${state.version}`;

        const releaseAssets = await loadReleaseAssets(state.version);
        state.ipaUrl = releaseAssets.ipaUrl;
        state.apkUrl = releaseAssets.apkUrl;

        if (state.platform === 'ios') {
          renderIos();
        } else if (state.platform === 'android') {
          renderAndroid();
        } else {
          renderUnsupported();
        }
      } catch (error) {
        versionText.textContent = 'Could not load update version.';
        document.getElementById('optionsSection').innerHTML = `
          <article class="option">
            <h2>Unable to load update information</h2>
            <p>Please try again later.</p>
          </article>
        `;
        console.error(error);
      }
    }

    loadVersionInfo();
  </script>
</body>
</html>
